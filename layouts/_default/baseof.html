<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  {{ $css := resources.Get "css/site.css" | resources.Minify | resources.Fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
  <script>
    (() => {
      try {
        const stored = localStorage.getItem('bz-theme');
        if (stored === 'dark' || stored === 'light') {
          document.documentElement.dataset.theme = stored;
        }
      } catch (e) {}
    })();
  </script>
</head>
<body class="site-body" style="--site-bg: url('{{ printf "%simages/bg.png" site.Home.RelPermalink }}');">
  <div class="site-ambient site-ambient--one" aria-hidden="true"></div>
  <div class="site-ambient site-ambient--two" aria-hidden="true"></div>
  <div class="site-shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="{{ site.Home.RelPermalink }}">
          <span class="site-brand__mark">{{ site.Params.avatarInitials }}</span>
          <span class="site-brand__text">{{ site.Title }}</span>
        </a>
        <div class="site-header__navwrap">
          <nav class="site-nav">
            {{ range site.Menus.main }}
              <a href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
          </nav>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="切换明暗主题" title="切换明暗主题">
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12 2.8v2.2M12 19v2.2M4.9 4.9l1.55 1.55M17.55 17.55l1.55 1.55M2.8 12h2.2M19 12h2.2M4.9 19.1l1.55-1.55M17.55 6.45l1.55-1.55" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M15.5 3.7a8.7 8.7 0 1 0 4.8 15.9 7.9 7.9 0 0 1-4.8-15.9Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              </svg>
            </span>
          </button>
        </div>
      </div>
    </header>

    <main class="site-main">
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer">
      <p>&copy; {{ now.Year }} {{ site.Params.author }}</p>
    </footer>
  </div>

  <script>
    (() => {
      const button = document.querySelector('[data-theme-toggle]');
      if (!button) return;

      const sync = () => {
        const theme = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
        button.setAttribute('aria-pressed', String(theme === 'dark'));
      };

      button.addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        try {
          localStorage.setItem('bz-theme', next);
        } catch (e) {}
        sync();
      });

      sync();
    })();
  </script>

  <script>
    (() => {
      const nodes = document.querySelectorAll('[data-typewriter]');
      if (!nodes.length) return;

      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      nodes.forEach((node) => {
        const text = node.getAttribute('data-typewriter-text') || node.textContent || '';
        if (!text) return;

        if (reduceMotion) {
          node.textContent = text;
          return;
        }

        node.textContent = '';
        let index = 0;
        const tick = () => {
          node.textContent = text.slice(0, index);
          if (index < text.length) {
            index += 1;
            window.setTimeout(tick, 70);
          }
        };

        window.setTimeout(tick, 220);
      });
    })();
  </script>

<script>
(function() {
  var nav = document.querySelector('.article-toc__nav');
  if (!nav) return;
  var toc = nav.querySelector('#TableOfContents');
  if (toc) {
    toc.querySelectorAll(':scope > ul > li').forEach(function(li) {
      var sub = li.querySelector(':scope > ul');
      if (!sub) return;
      li.querySelector(':scope > a').addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        li.classList.toggle('open');
      });
    });
  }
  nav.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    var li = link.closest('li');
    if (li && li.querySelector(':scope > ul') && li.classList.contains('open')) return;
    if (li && li.querySelector(':scope > ul') && !li.classList.contains('open')) {
      li.classList.add('open');
    }
    var hash = link.getAttribute('href');
    if (!hash || hash.charAt(0) !== '#') return;
    e.preventDefault();
    var el = document.getElementById(hash.slice(1));
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth' });
    history.replaceState(null, '', hash);
  });
})();
</script>
</body>
</html>
