{{ define "main" }}
  <section class="page-head">
    <p class="section-head__eyebrow">Tag</p>
    <h1>{{ .Title }}</h1>
  </section>

  <section class="card-grid">
    {{ range .Pages }}
      <article class="post-card">
        <a class="post-card__link" href="{{ .RelPermalink }}">
          <div class="post-card__body">
            <p class="post-card__meta">{{ .Date.Format "2006-01-02" }}</p>
            <h3>{{ .Title }}</h3>
            <p class="post-card__summary">{{ .Description }}</p>
          </div>
        </a>
      </article>
    {{ end }}
  </section>
{{ end }}
