{{ define "main" }}
  <article class="article-shell">
    <header class="article-head">
      <p class="eyebrow">{{ .Section | default "Article" }}</p>
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="article-head__summary">{{ . }}</p>{{ end }}
      <div class="article-meta-row">
        <span>{{ .Date.Format "2006-01-02" }}</span>
        {{ with .Params.tags }}
          <span>{{ delimit . " · " }}</span>
        {{ end }}
      </div>
    </header>

    <div class="article-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
