{{ define "main" }}
  <article class="article">
    <header class="article__header">
      <p class="article__meta">{{ .Date.Format "2006-01-02" }}</p>
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="article__summary">{{ . }}</p>{{ end }}
    </header>
    <div class="article__content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
