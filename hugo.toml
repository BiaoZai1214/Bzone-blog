baseURL = 'https://bzone-blog.github.io/'
languageCode = 'zh-cn'
locale = 'zh-CN'
title = '标仔Blog'
theme = "blowfish"

# 作者信息
[author]
  name = "Bz"
  email = "bzone@example.com"

# 网站描述
description = "标仔的小空间"

# 启用中文搜索
defaultContentLanguage = "zh-cn"

# 分页设置
paginate = 10

# 启用 emoji
enableEmoji = true

# 启用 RSSe
enableRobotsTXT = true

# 静态文件输出目录
publishDir = "public"

# 时区
timeZone = "Asia/Shanghai"

# 菜单设置
[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "posts"
  name = ""
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 3

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 4

[params]
  homeInfoParams = {Title = "欢迎", Content = "这里分享技术与生活"}

  # 主题色彩
  themeColor = "#0078D4"

  # 展示模式 (false = 浅色模式)
  defaultTheme = "dark"

  # 许可证
  showCopyright = true
  copyright = "CC BY-NC-SA 4.0"

  # 文章阅读时间
  ShowReadingTime = true

  # 代码块复制按钮
  codeCopyButton = true

  # 评论系统 (预留)
  comments = false

  # 社交链接
  [[params.socialIcons]]
    icon = "twitter"
    title = "Twitter"
    url = "https://twitter.com"

  [[params.socialIcons]]
    icon = "github"
    title = "GitHub"
    url = "https://github.com"

# 高级配置
[build]
  writeStats = true
